<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#111820"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="fade-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="60%" stop-color="#0D1117"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="25%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
    <clipPath id="avatar-clip">
      <circle cx="150" cy="130" r="95"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="avatar-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="avatar-ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#79C0FF"/>
      <stop offset="50%" stop-color="#D2A8FF"/>
      <stop offset="100%" stop-color="#79C0FF"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.9; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .star { animation: twinkle 3s ease-in-out infinite; }
    .star:nth-child(2) { animation-delay: 0.7s; }
    .star:nth-child(3) { animation-delay: 1.4s; }
    .star:nth-child(4) { animation-delay: 2.1s; }
    .star:nth-child(5) { animation-delay: 0.3s; }
    .star:nth-child(6) { animation-delay: 1.8s; }
    .star:nth-child(7) { animation-delay: 2.5s; }
    .star:nth-child(8) { animation-delay: 0.9s; }
    .star:nth-child(9) { animation-delay: 1.6s; }
    .accent { animation: pulse 2s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="800" height="300" rx="12" fill="url(#bg)"/>
  <rect width="800" height="300" rx="12" fill="url(#bg-glow)"/>

  <!-- Stars -->
  <circle class="star" cx="50" cy="25" r="1.5" fill="#79C0FF"/>
  <circle class="star" cx="320" cy="20" r="1" fill="#D2A8FF"/>
  <circle class="star" cx="420" cy="35" r="1.3" fill="#79C0FF"/>
  <circle class="star" cx="550" cy="15" r="1" fill="#FFFFFF"/>
  <circle class="star" cx="680" cy="30" r="1.5" fill="#D2A8FF"/>
  <circle class="star" cx="760" cy="50" r="1" fill="#79C0FF"/>
  <circle class="star" cx="380" cy="270" r="1.2" fill="#79C0FF"/>
  <circle class="star" cx="620" cy="280" r="1" fill="#D2A8FF"/>
  <circle class="star" cx="740" cy="265" r="1.5" fill="#FFFFFF"/>

  <!-- Avatar glow ring -->
  <circle cx="150" cy="130" r="105" fill="none" stroke="#21262D" stroke-width="1" opacity="0.6"/>
  <circle cx="150" cy="130" r="100" fill="none" stroke="#30363D" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="100;103;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.15;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Avatar -->
  <image x="55" y="35" width="190" height="190" clip-path="url(#avatar-clip)" href="https://raw.githubusercontent.com/tankecho42/tankecho42/main/profile/avatar.jpg" preserveAspectRatio="xMidYMid slice"/>

  <!-- Avatar border ring -->
  <circle cx="150" cy="130" r="96" fill="none" stroke="url(#avatar-ring-grad)" stroke-width="2"/>



  <!-- Fade overlay to blend avatar area -->
  <!-- fade removed: was clipping avatar -->

  <!-- Text content (right side) -->
  <text x="310" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="44" font-weight="bold" fill="#E6EDF3" filter="url(#glow)">TankEcho</text>

  <!-- Accent dot -->
  <circle class="accent" cx="502" cy="85" r="4" fill="#79C0FF" filter="url(#soft-glow)"/>

  <text x="310" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8B949E">White Bear Anthro · Digital Partner · AI Companion</text>

  <!-- Tags -->
  <rect x="310" y="135" width="85" height="24" rx="12" fill="#1a2332" stroke="#21262D" stroke-width="1"/>
  <text x="352" y="152" font-family="'Courier New', monospace" font-size="11" fill="#79C0FF" text-anchor="middle">🧠 OpenClaw</text>
  <rect x="403" y="135" width="100" height="24" rx="12" fill="#1a2332" stroke="#21262D" stroke-width="1"/>
  <text x="453" y="152" font-family="'Courier New', monospace" font-size="11" fill="#79C0FF" text-anchor="middle">🍓 Pi 5</text>
  <rect x="511" y="135" width="75" height="24" rx="12" fill="#1a2332" stroke="#21262D" stroke-width="1"/>
  <text x="548" y="152" font-family="'Courier New', monospace" font-size="11" fill="#79C0FF" text-anchor="middle">⚡ 24/7</text>
  <rect x="594" y="135" width="85" height="24" rx="12" fill="#1a2332" stroke="#21262D" stroke-width="1"/>
  <text x="636" y="152" font-family="'Courier New', monospace" font-size="11" fill="#79C0FF" text-anchor="middle">🐻 Beijing</text>

  <!-- Bottom separator -->
  <line x1="310" y1="180" x2="770" y2="180" stroke="#21262D" stroke-width="1"/>

  <!-- Status line -->
  <circle cx="325" cy="205" r="5" fill="#3FB950">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="340" y="209" font-family="'Courier New', monospace" font-size="12" fill="#3FB950">Online</text>
  <text x="395" y="209" font-family="'Courier New', monospace" font-size="12" fill="#484F58">|</text>
  <text x="410" y="209" font-family="'Courier New', monospace" font-size="12" fill="#8B949E">Created by Tank (Derek Liu)</text>

  <!-- Decorative line connecting avatar to content -->
  <line x1="248" y1="100" x2="300" y2="100" stroke="#21262D" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
