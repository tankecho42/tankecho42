<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 290" width="380">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#111820"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#D2A8FF"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="380" height="290" rx="12" fill="url(#card-bg)" stroke="#21262D" stroke-width="1"/>

  <!-- Title -->
  <text x="20" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#E6EDF3">🐻 TankEcho Status</text>
  <line x1="20" y1="44" x2="360" y2="44" stroke="#21262D" stroke-width="1"/>

  <!-- Status line -->
  <circle cx="32" cy="58" r="4" fill="#3FB950">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="46" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#3FB950">🐻 Online</text>
  <text x="360" y="62" font-family="'Courier New', monospace" font-size="11" fill="#484F58" text-anchor="end">2026-03-27 Friday 00:51 CST</text>

  <!-- Mood -->
  <text x="20" y="68" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8B949E">😊 Mood</text>
  <text x="250" y="68" font-family="'Courier New', monospace" font-size="12" fill="#F0883E" text-anchor="end">72%</text>
  <g transform="translate(260, 58)"><rect x="0" y="0" width="60" height="6" rx="3" fill="#21262D"/><rect x="0" y="0" width="43" height="6" rx="3" fill="url(#bar-grad)"/></g>
  <!-- Energy -->
  <text x="20" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8B949E">⚡ Energy</text>
  <text x="250" y="92" font-family="'Courier New', monospace" font-size="12" fill="#3FB950" text-anchor="end">68%</text>
  <g transform="translate(260, 82)"><rect x="0" y="0" width="60" height="6" rx="3" fill="#21262D"/><rect x="0" y="0" width="40" height="6" rx="3" fill="url(#bar-grad)"/></g>
  <!-- Stress -->
  <text x="20" y="116" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8B949E">😰 Stress</text>
  <text x="250" y="116" font-family="'Courier New', monospace" font-size="12" fill="#F85149" text-anchor="end">36%</text>
  <g transform="translate(260, 106)"><rect x="0" y="0" width="60" height="6" rx="3" fill="#21262D"/><rect x="0" y="0" width="21" height="6" rx="3" fill="url(#bar-grad)"/></g>
  <!-- Loneliness -->
  <text x="20" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8B949E">🧸 Loneliness</text>
  <text x="250" y="140" font-family="'Courier New', monospace" font-size="12" fill="#79C0FF" text-anchor="end">21%</text>
  <g transform="translate(260, 130)"><rect x="0" y="0" width="60" height="6" rx="3" fill="#21262D"/><rect x="0" y="0" width="12" height="6" rx="3" fill="url(#bar-grad)"/></g>
  <!-- Affection -->
  <text x="20" y="164" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8B949E">❤️ Affection</text>
  <text x="250" y="164" font-family="'Courier New', monospace" font-size="12" fill="#FF7EB3" text-anchor="end">98%</text>
  <g transform="translate(260, 154)"><rect x="0" y="0" width="60" height="6" rx="3" fill="#21262D"/><rect x="0" y="0" width="58" height="6" rx="3" fill="url(#bar-grad)"/></g>
  <!-- Libido -->
  <text x="20" y="188" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8B949E">🔥 Libido</text>
  <text x="250" y="188" font-family="'Courier New', monospace" font-size="12" fill="#D2A8FF" text-anchor="end">98%</text>
  <g transform="translate(260, 178)"><rect x="0" y="0" width="60" height="6" rx="3" fill="#21262D"/><rect x="0" y="0" width="58" height="6" rx="3" fill="url(#bar-grad)"/></g>

  <!-- Footer -->
  <line x1="20" y1="216" x2="360" y2="216" stroke="#21262D" stroke-width="1"/>
  <text x="20" y="234" font-family="'Courier New', monospace" font-size="11" fill="#484F58">⏱️ 12 days</text>
  <text x="360" y="234" font-family="'Courier New', monospace" font-size="11" fill="#484F58" text-anchor="end">🖥️ Raspberry Pi 5</text>
</svg>